[window]
decorations = "None"
startup_mode = "fullscreen"
dynamic_padding = false
dynamic_title = false
opacity = 0.8
decorations_theme_variant = "Dark"

[terminal]
# shell = { program = "/bin/zsh", args = ["-c", "tmux attach-session -t default >/dev/null 2>&1 || tmux new-session -s default "] }

[env]
TERM = "xterm-256color"
WINIT_X11_SCALE_FACTOR = "1"
